<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>클로드로 워드보고서 작성하기</title>
<style>
  :root{--bg:#fff;--surface:#f6f7f9;--text:#1a1d21;--muted:#5b6470;--border:#e6e9ee;--brand:#1257d6}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',system-ui,-apple-system,'Segoe UI',Roboto,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:var(--text);background:var(--bg);min-height:100vh;padding:56px 24px}
  .wrap{max-width:860px;margin:0 auto;position:relative}
  header{margin-bottom:36px}
  h1{font-size:30px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
  .sub{color:var(--muted);font-size:15px}

  /* 도구모음 런처 (우상단) */
  .da-launcher{position:absolute;top:0;right:0;display:inline-flex;align-items:center;gap:7px;height:32px;padding:0 12px;border:1.5px solid var(--border);border-radius:8px;background:#fff;text-decoration:none;color:var(--text);font-size:12px;font-weight:600;line-height:1;transition:.15s}
  .da-launcher:hover{border-color:var(--brand);box-shadow:0 4px 18px rgba(18,87,214,.12)}
  .da-launcher svg{width:16px;height:16px;color:var(--muted);transition:.15s}
  .da-launcher:hover svg{color:var(--brand)}

  /* 세로 나열 섹션 */
  .panel{margin-bottom:44px}
  .panel:last-of-type{margin-bottom:0}

  .panel-head{margin-bottom:18px}
  .panel-head h2{font-size:20px;font-weight:700;letter-spacing:-.3px}
  .panel-head .desc{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.6}

  /* STEP 배지 (메뉴 순번) */
  .step-badge{display:inline-flex;align-items:center;height:25px;padding:0 13px;border-radius:999px;background:#1a2332;color:#fff;font-size:12px;font-weight:700;letter-spacing:.8px;flex:none}

  /* 배지 + 제목을 한 줄에 나란히 배치 */
  .head-title{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

  /* 하위 메뉴(서브 패널) */
  .subpanel{margin-top:28px}
  .panel-head + .subpanel{margin-top:0}
  .subpanel-head{margin-bottom:14px}
  .subpanel-head h3{font-size:16px;font-weight:700;letter-spacing:-.2px}
  .subpanel-head .desc{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.6}

  /* 클로드 에이전트 만들기 — 두 세부 메뉴를 하나의 박스에 */
  .make-box{border:1.5px solid var(--border);border-radius:14px;padding:22px;background:var(--surface)}
  .make-box > .subpanel{margin-top:0}
  .make-box > .subpanel + .subpanel{margin-top:24px;padding-top:24px;border-top:1.5px solid var(--border)}
  .make-box .empty{background:#fff;border-style:solid}
  .release-group{margin-bottom:14px}
  .release-group:last-child{margin-bottom:0}

  /* 릴리스(자료) 목록 */
  @keyframes skeleton-wave{0%{background-position:-200px 0}100%{background-position:calc(200px + 100%) 0}}
  .skeleton{background:#eef0f3;background-image:linear-gradient(90deg,#eef0f3 0,#e2e6ec 40px,#eef0f3 80px);background-size:200px 100%;background-repeat:no-repeat;animation:skeleton-wave 1.2s infinite linear;border-radius:10px;display:block;height:120px;margin-bottom:14px}
  .skeleton.s2{height:96px;width:85%}
  .release{border:1.5px solid var(--border);border-radius:14px;padding:22px;margin-bottom:14px;background:var(--surface)}
  .release-title{font-size:16px;font-weight:700;color:var(--text);margin:0 0 12px}
  .assets{list-style:none}
  .asset{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#fff;border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px;transition:border-color .12s,background .12s}
  .asset:last-child{margin-bottom:0}
  .asset:hover{border-color:var(--brand);background:#fafbfd}
  .asset-icon{font-size:16px;flex-shrink:0}
  .asset-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
  .asset-meta{font-size:11px;color:var(--muted);white-space:nowrap}
  .asset-btn{flex-shrink:0;padding:7px 14px;background:var(--brand);color:#fff;border:0;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;cursor:pointer;transition:opacity .12s}
  .asset-btn:hover{opacity:.88}
  .release-meta{margin-top:12px;font-size:11px;color:var(--muted)}
  .release-change{color:var(--brand);font-weight:600}
  .no-asset{color:var(--muted);font-size:12px}

  /* 공용 빈/오류 상태 */
  .empty{text-align:center;padding:56px 20px;color:var(--muted);font-size:14px;line-height:1.7;border:1.5px dashed var(--border);border-radius:14px;background:var(--surface)}
  .empty .emoji{font-size:30px;display:block;margin-bottom:12px}
  .empty .pill{display:inline-block;margin-top:14px;font-size:12px;font-weight:600;color:var(--brand);background:rgba(18,87,214,.08);border-radius:999px;padding:5px 12px}
  .error{background:#ffeaea;color:#8a0000;padding:14px;border-radius:12px;font-size:13px}

  /* 조사 결과물 목록(표) — 포털 동일 */
  .filelist{margin-top:0}
  .filelist-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
  .filelist-count{font-size:14px;font-weight:600;color:var(--text)}
  .filelist-count b{color:var(--brand)}
  .filelist-search{font:inherit;font-size:13px;padding:8px 12px;border:1.5px solid var(--border);border-radius:10px;background:#fff;color:var(--text);outline:none;width:220px;max-width:50%;transition:border-color .15s}
  .filelist-search:focus{border-color:var(--brand)}
  .filelist-wrap{overflow-x:auto}
  .filelist-table{width:100%;border-collapse:collapse;font-size:13px}
  .filelist-table th{text-align:left;font-weight:600;font-size:12px;color:var(--muted);padding:0 12px 10px;border-bottom:1.5px solid var(--border);white-space:nowrap}
  .filelist-table th.sortable{cursor:pointer;user-select:none;-webkit-user-select:none}
  .filelist-table th.sortable:hover{color:var(--brand)}
  .filelist-table th.sortable::after{content:'';display:inline-block;margin-left:5px;opacity:.55}
  .filelist-table th.sort-asc{color:var(--brand)}
  .filelist-table th.sort-desc{color:var(--brand)}
  .filelist-table th.sort-asc::after{content:'▲';font-size:9px}
  .filelist-table th.sort-desc::after{content:'▼';font-size:9px}
  .filelist-table td{padding:13px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
  .filelist-table tr:hover td{background:var(--surface)}
  .filelist-table .col-size,.filelist-table .col-date{white-space:nowrap;color:var(--muted)}
  .filelist-table .col-act{text-align:right;white-space:nowrap}
  .filelist .fname{font-weight:600;overflow-wrap:anywhere;color:var(--text);text-decoration:none;cursor:pointer}
  .filelist .fname:hover{color:var(--brand);text-decoration:underline}
  .filelist .fdl{color:var(--brand);text-decoration:none;font-weight:600;margin-right:6px}
  .filelist .fdl:hover{text-decoration:underline}
  .filelist .fdel{font:inherit;font-size:13px;color:var(--muted);background:transparent;border:none;cursor:pointer;padding:4px 8px;border-radius:7px;transition:background .12s,color .12s}
  .filelist .fdel:hover{background:#ffe1e1;color:#c0392b}
  .filelist-empty{padding:30px 12px;text-align:center;color:var(--muted);font-size:14px}
  .filelist-table .col-check{width:34px;text-align:center;padding-left:0;padding-right:0}
  .filelist-table .col-check input{width:16px;height:16px;cursor:pointer;accent-color:var(--brand);margin:0;vertical-align:middle}
  .filelist-table tr.is-selected td{background:rgba(18,87,214,.06)}
  .filelist-bulk{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;font-size:13px}
  .filelist-bulk .bulk-count{color:var(--text);font-weight:600}
  .filelist-bulk .bulk-count b{color:var(--brand)}
  .filelist-bulk .bulk-btn{margin-left:0;font:inherit;font-size:13px;font-weight:600;color:var(--brand);background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;transition:border-color .12s,background .12s,color .12s}
  .filelist-bulk .bulk-btn:hover{border-color:var(--brand)}
  .filelist-bulk .bulk-del{color:#c0392b}
  .filelist-bulk .bulk-del:hover{border-color:#c0392b;background:#ffe1e1}
  .dropzone{margin-top:14px;border:1.5px dashed var(--border);border-radius:14px;padding:22px;text-align:center;color:var(--muted);font-size:14px;cursor:pointer;transition:border-color .15s,background .15s,color .15s}
  .dropzone:hover{border-color:var(--brand)}
  .dropzone.is-over{border-color:var(--brand);background:rgba(18,87,214,.06);color:var(--brand)}
  .upload-status{margin-top:10px;font-size:13px;color:var(--muted);min-height:18px}

  @media (max-width:600px){
    body{padding:48px 18px}
    h1{font-size:25px}
    .da-launcher span{display:none}
    .da-launcher{padding:0 9px}
    .filelist-wrap{overflow-x:visible}
    .filelist-table thead{display:none}
    .filelist-table tbody,.filelist-table tr,.filelist-table td{display:block}
    .filelist-table tr{position:relative;padding:12px 0 12px 32px;border-bottom:1px solid var(--border)}
    .filelist-table tr:hover td{background:none}
    .filelist-table td{padding:0;border:none}
    .filelist-table .col-check{position:absolute;left:0;top:13px;width:auto;text-align:left}
    .filelist-table .col-name{margin-bottom:5px}
    .filelist-table .fname{display:block;font-size:14px;overflow-wrap:anywhere}
    .filelist-table .col-size,.filelist-table .col-date{display:inline-block;font-size:12px}
    .filelist-table .col-size{margin-right:12px}
    .filelist-table .col-act{margin-top:8px;text-align:left}
    .filelist-table .fdl{margin-right:14px}
    .filelist-empty{padding:24px 0}
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="da-launcher" href="https://samsungda.net" title="도구모음 열기">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g stroke="currentColor" stroke-width="1.8"><rect x="3.8" y="3.8" width="7" height="7" rx="1.6"/><rect x="13.2" y="3.8" width="7" height="7" rx="1.6"/><rect x="3.8" y="13.2" width="7" height="7" rx="1.6"/><rect x="13.2" y="13.2" width="7" height="7" rx="1.6"/></g></svg>
    <span>도구모음</span>
  </a>

  <header>
    <h1>클로드로 워드보고서 작성하기</h1>
    <p class="sub">Claude AI 에이전트 활용법과 작업 가이드, 실제 보고서 예시를 한곳에서 안내합니다.</p>
  </header>

  <!-- 메뉴 1 : 클로드 에이전트 만들기 -->
  <section class="panel" data-panel="make">
    <div class="panel-head">
      <div class="head-title">
        <span class="step-badge">MENU 1</span>
        <h2>클로드 에이전트 만들기</h2>
      </div>
      <p class="desc">클로드 에이전트를 직접 만드는 데 필요한 활용법과 작업 가이드 자료를 다운로드할 수 있습니다.</p>
    </div>

    <div class="make-box">
      <div id="releases">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton s2"></div>
      </div>
    </div>
  </section>

  <!-- 메뉴 2 : 워드보고서 작성 예시 -->
  <section class="panel" data-panel="examples" id="research-section">
    <div class="panel-head">
      <div class="head-title">
        <span class="step-badge">MENU 2</span>
        <h2>워드보고서 작성 예시</h2>
      </div>
      <p class="desc">클로드를 이용해 작성한 보고서입니다. (누구나 업로드 가능)</p>
    </div>
    <div class="dropzone" id="research-dropzone" role="button" tabindex="0">
      파일을 끌어다 놓거나 클릭해서 업로드
      <input id="research-file" type="file" multiple hidden>
    </div>
    <p class="upload-status" id="research-status" aria-live="polite"></p>
    <div class="filelist">
      <div class="filelist-head">
        <span class="filelist-count">파일 목록 <b id="research-count">0</b>개</span>
        <input type="search" id="research-search" class="filelist-search" placeholder="파일 이름 검색…">
      </div>
      <div class="filelist-bulk" id="research-bulk" hidden>
        <span class="bulk-count"><b id="research-selcount">0</b>개 선택됨</span>
        <button type="button" class="bulk-btn" id="research-dl-sel">선택 다운로드</button>
        <button type="button" class="bulk-btn bulk-del" id="research-del-sel">선택 삭제</button>
      </div>
      <div class="filelist-wrap">
        <table class="filelist-table">
          <thead><tr><th class="col-check"><input type="checkbox" id="research-checkall" aria-label="전체 선택"></th><th class="col-name sortable" data-sort="name">이름</th><th class="col-size sortable" data-sort="size">크기</th><th class="col-date sortable" data-sort="date">업로드</th><th class="col-act"></th></tr></thead>
          <tbody id="research-tbody"></tbody>
        </table>
      </div>
    </div>
  </section>

</div>

<script>
(function(){
  /* ---------- 메뉴 1 : 릴리스(자료) 목록 ---------- */
  function formatBytes(b){
    if(b < 1024) return b + ' B';
    if(b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
    return (b/1024/1024).toFixed(1) + ' MB';
  }
  function formatDate(iso){
    if(!iso) return '';
    var d = new Date(iso);
    if(isNaN(d)) return '';
    var p = function(n){ return String(n).padStart(2,'0'); };
    return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate());
  }
  function fileIcon(name){
    var ext = String(name).split('.').pop().toLowerCase();
    if(ext === 'docx' || ext === 'doc') return '📄';
    if(ext === 'pdf') return '📕';
    if(ext === 'pptx' || ext === 'ppt') return '📊';
    if(ext === 'xlsx' || ext === 'xls') return '📈';
    if(ext === 'txt' || ext === 'md') return '📝';
    if(ext === 'zip' || ext === 'tar' || ext === 'gz') return '📦';
    return '📎';
  }
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; }); }

  function loadReleases(){
    var box = document.getElementById('releases');
    fetch('/api/releases').then(function(r){
      if(!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }).then(function(releases){
      if(!Array.isArray(releases) || !releases.length){
        box.innerHTML = '<div class="empty"><span class="emoji">📭</span>아직 등록된 자료가 없습니다.<br>GitHub Releases에 파일이 업로드되면 여기에 자동으로 표시됩니다.</div>';
        return;
      }
      box.innerHTML = releases.map(function(rel){
        var assets = (rel.assets || []).map(function(a){
          return '<li class="asset">'
            + '<span class="asset-icon">' + fileIcon(a.name) + '</span>'
            + '<span class="asset-name">' + esc(a.name) + '</span>'
            + '<span class="asset-meta">' + formatBytes(a.size) + '</span>'
            + '<a class="asset-btn" href="/api/download/' + encodeURIComponent(a.asset_id) + '">다운로드</a>'
            + '</li>';
        }).join('');
        var changeLabel = String(rel.description || '').split('\n')[0].trim();
        return '<div class="release-group">'
          + (assets ? '<ul class="assets">' + assets + '</ul>' : '<p class="no-asset">첨부 파일 없음</p>')
          + '<div class="release-meta">' + formatDate(rel.latest_uploaded_at || rel.latest_updated_at || rel.published_at)
          + (changeLabel ? ' <span class="release-change">(' + esc(changeLabel) + ')</span>' : '')
          + '</div></div>';
      }).join('');
    }).catch(function(err){
      box.innerHTML = '<div class="error">자료 목록을 불러오지 못했습니다 : ' + esc(err.message) + '</div>';
    });
  }
  loadReleases();

  /* ---------- 업로드형 파일 목록 (보고서 예시 / 추가 가이드 공용) ---------- */
  // opts: { section, prefix, apiBase, fileBase, emptyText }
  function initFileList(opts){
    var section = document.getElementById(opts.section);
    var dz = document.getElementById(opts.prefix + '-dropzone');
    var input = document.getElementById(opts.prefix + '-file');
    var status = document.getElementById(opts.prefix + '-status');
    var tbody = document.getElementById(opts.prefix + '-tbody');
    var count = document.getElementById(opts.prefix + '-count');
    var search = document.getElementById(opts.prefix + '-search');
    var checkAll = document.getElementById(opts.prefix + '-checkall');
    var bulk = document.getElementById(opts.prefix + '-bulk');
    var selCount = document.getElementById(opts.prefix + '-selcount');
    var dlSelBtn = document.getElementById(opts.prefix + '-dl-sel');
    var delSelBtn = document.getElementById(opts.prefix + '-del-sel');
    if(!tbody || !dz || !input || !section) return;
    var apiBase = opts.apiBase;            // 예: '/api/research'
    var fileBase = opts.fileBase;          // 예: '/research/'
    var emptyText = opts.emptyText || '아직 업로드된 파일이 없습니다.';

    var allItems = [];
    var selected = {};
    var visibleIds = [];
    var sortKey = 'date', sortDir = 'desc';
    var headers = section.querySelectorAll('.filelist-table th.sortable');

    function fmtDate(s){
      var d = new Date(s);
      if(isNaN(d)) return '';
      var p = function(n){ return String(n).padStart(2, '0'); };
      return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
    }
    function fmtSize(n){
      n = Number(n) || 0;
      if(n < 1024) return n + ' B';
      if(n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
      return (n/(1024*1024)).toFixed(1) + ' MB';
    }

    function render(items){
      allItems = Array.isArray(items) ? items : [];
      applyFilter();
    }

    function sortVal(it){
      if(sortKey === 'size') return Number(it.size) || 0;
      if(sortKey === 'date') return new Date(it.uploaded).getTime() || 0;
      return String(it.name || '').toLowerCase();
    }

    function applyFilter(){
      var q = (search && search.value || '').trim().toLowerCase();
      var list = q ? allItems.filter(function(it){
        return String(it.name || '').toLowerCase().indexOf(q) > -1 || String(it.title || '').toLowerCase().indexOf(q) > -1;
      }) : allItems.slice();
      var dir = sortDir === 'asc' ? 1 : -1;
      list.sort(function(a, b){
        var va = sortVal(a), vb = sortVal(b);
        return va < vb ? -dir : va > vb ? dir : 0;
      });
      if(count) count.textContent = list.length;
      visibleIds = list.map(function(it){ return it.id; });
      if(!list.length){
        tbody.innerHTML = '<tr><td class="filelist-empty" colspan="5">'+(allItems.length ? '검색 결과가 없습니다.' : emptyText)+'</td></tr>';
        updateBulk();
        return;
      }
      tbody.innerHTML = list.map(function(it){
        var sel = !!selected[it.id];
        return '<tr'+(sel ? ' class="is-selected"' : '')+'>'
          + '<td class="col-check"><input type="checkbox" class="fchk" data-id="'+esc(it.id)+'"'+(sel ? ' checked' : '')+' aria-label="선택"></td>'
          + '<td class="col-name"><a class="fname" href="'+fileBase+encodeURIComponent(it.id)+'" target="_blank" rel="noopener">'+esc(it.name)+'</a></td>'
          + '<td class="col-size">'+fmtSize(it.size)+'</td>'
          + '<td class="col-date">'+fmtDate(it.uploaded)+'</td>'
          + '<td class="col-act"><a class="fdl" href="'+fileBase+encodeURIComponent(it.id)+'" target="_blank" rel="noopener">다운로드</a>'
          + '<button class="fdel" data-id="'+esc(it.id)+'" title="삭제" aria-label="삭제">삭제</button></td>'
          + '</tr>';
      }).join('');
      updateBulk();
    }

    function selectedVisible(){ return visibleIds.filter(function(id){ return selected[id]; }); }

    function updateBulk(){
      var existing = {};
      allItems.forEach(function(it){ existing[it.id] = true; });
      Object.keys(selected).forEach(function(id){ if(!existing[id]) delete selected[id]; });
      var sel = selectedVisible(), n = sel.length;
      if(selCount) selCount.textContent = n;
      if(bulk) bulk.hidden = n === 0;
      if(checkAll){
        checkAll.checked = visibleIds.length > 0 && n === visibleIds.length;
        checkAll.indeterminate = n > 0 && n < visibleIds.length;
      }
    }

    if(search) search.addEventListener('input', applyFilter);

    function updateSortIndicator(){
      Array.prototype.forEach.call(headers, function(th){
        var on = th.getAttribute('data-sort') === sortKey;
        th.classList.toggle('sort-asc', on && sortDir === 'asc');
        th.classList.toggle('sort-desc', on && sortDir === 'desc');
        th.setAttribute('aria-sort', on ? (sortDir === 'asc' ? 'ascending' : 'descending') : 'none');
      });
    }
    Array.prototype.forEach.call(headers, function(th){
      th.addEventListener('click', function(){
        var key = th.getAttribute('data-sort');
        if(sortKey === key){ sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
        else { sortKey = key; sortDir = key === 'name' ? 'asc' : 'desc'; }
        updateSortIndicator();
        applyFilter();
      });
    });
    updateSortIndicator();

    function load(){
      fetch(apiBase).then(function(r){ return r.ok ? r.json() : []; }).then(render).catch(function(){});
    }

    function upload(fileList){
      var files = fileList ? Array.prototype.slice.call(fileList) : [];
      if(!files.length) return;
      var many = files.length > 1;
      var uploader = window.prompt('업로드한 사람 이름을 입력하세요' + (many ? '\n(' + files.length + '개 파일 전체에 적용)' : '')) || '';
      var filePw = window.prompt('삭제 비밀번호를 설정하세요\n(삭제하려면 이 비밀번호가 필요합니다' + (many ? ' · ' + files.length + '개 파일 전체에 적용' : '') + ')');
      if(!filePw){ status.style.color = ''; status.textContent = '업로드 취소됨 (삭제 비밀번호 필요).'; return; }
      var done = 0, failed = 0, lastErr = '';
      status.style.color = '';
      status.textContent = '업로드 중… (0/'+files.length+')';
      function fail(code, detail, isHtml){
        failed++;
        if(isHtml){
          lastErr = '업로드가 네트워크 보안 장비(사내 프록시/DLP)에 의해 차단된 것 같습니다'
            + (code ? ' (HTTP ' + code + ')' : '')
            + '. 회사 보안 프로그램·사내망 정책 때문일 수 있으니, 다른 네트워크(예: 휴대폰 핫스팟)에서 다시 시도하거나 IT 담당자에게 이 사이트 허용을 요청하세요.';
          return;
        }
        if(code === 401){ lastErr = '권한 오류(401) — 페이지를 새로고침한 뒤 다시 시도하세요.'; }
        else if(code === 503){ lastErr = '서버 미설정(503): ' + (detail || 'R2 버킷 확인 필요'); }
        else if(code){ lastErr = 'HTTP ' + code + (detail ? (' · ' + detail) : ''); }
        else { lastErr = detail || '네트워크 오류'; }
      }
      function finish(){
        var msg = '완료: '+done+'개' + (failed ? (' · 실패 '+failed+'개') : '');
        if(failed && lastErr) msg += ' — ' + lastErr;
        status.style.color = failed ? '#c0392b' : '';
        status.textContent = msg;
        load();
      }
      function next(i){
        if(i >= files.length){ finish(); return; }
        status.textContent = '업로드 중… ('+(done+failed)+'/'+files.length+')';
        var fd = new FormData();
        fd.append('file', files[i]);
        fd.append('title', files[i].name.replace(/\.[^.]+$/, ''));
        fd.append('uploader', uploader);
        fd.append('password', filePw);
        fetch(apiBase, { method:'POST', body: fd })
          .then(function(r){
            if(r.ok){ done++; next(i+1); return; }
            return r.text().then(function(t){
              var ct = (r.headers.get('content-type') || '').toLowerCase();
              var detail = '', isHtml = false;
              try{
                detail = (JSON.parse(t) || {}).error || '';
              }catch(e){
                isHtml = ct.indexOf('text/html') > -1 || /<html|<!doctype|<head|<title/i.test(t || '');
                detail = (t || '').replace(/\s+/g,' ').slice(0,120);
              }
              fail(r.status, detail, isHtml);
              next(i+1);
            });
          })
          .catch(function(e){ fail(0, e && e.message); next(i+1); });
      }
      next(0);
    }

    function hasFiles(e){ var t = e.dataTransfer && e.dataTransfer.types; return t && Array.prototype.indexOf.call(t, 'Files') > -1; }

    dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('is-over'); });
    dz.addEventListener('dragleave', function(){ dz.classList.remove('is-over'); });
    dz.addEventListener('drop', function(e){ e.preventDefault(); e.stopPropagation(); dz.classList.remove('is-over'); upload(e.dataTransfer.files); });
    dz.addEventListener('click', function(){ input.click(); });
    dz.addEventListener('keydown', function(e){ if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); input.click(); } });
    input.addEventListener('change', function(){ upload(input.files); input.value = ''; });

    section.addEventListener('dragover', function(e){ if(hasFiles(e)){ e.preventDefault(); dz.classList.add('is-over'); } });
    section.addEventListener('dragleave', function(e){ if(e.target === section) dz.classList.remove('is-over'); });
    section.addEventListener('drop', function(e){ if(e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length){ e.preventDefault(); dz.classList.remove('is-over'); upload(e.dataTransfer.files); } });

    function deleteOne(id, pw){
      return fetch(apiBase+'/'+encodeURIComponent(id), { method:'DELETE', headers:{ 'x-file-password': pw } })
        .then(function(r){
          if(r.status === 401 || r.status === 403) return { ok:false, auth:true };
          if(!r.ok && r.status !== 204) return { ok:false, status:r.status };
          return { ok:true };
        })
        .catch(function(e){ return { ok:false, err:(e && e.message) || '네트워크 오류' }; });
    }

    tbody.addEventListener('change', function(e){
      var chk = e.target.closest && e.target.closest('.fchk');
      if(!chk) return;
      var id = chk.getAttribute('data-id');
      if(chk.checked) selected[id] = true; else delete selected[id];
      var tr = chk.closest('tr');
      if(tr) tr.classList.toggle('is-selected', chk.checked);
      updateBulk();
    });

    if(checkAll){
      checkAll.addEventListener('change', function(){
        var on = checkAll.checked;
        visibleIds.forEach(function(id){ if(on) selected[id] = true; else delete selected[id]; });
        applyFilter();
      });
    }

    if(dlSelBtn) dlSelBtn.addEventListener('click', function(){
      var byId = {};
      allItems.forEach(function(it){ byId[it.id] = it; });
      selectedVisible().forEach(function(id, i){
        var it = byId[id];
        var a = document.createElement('a');
        a.href = fileBase + encodeURIComponent(id);
        a.download = (it && it.name) || '';
        a.rel = 'noopener';
        document.body.appendChild(a);
        setTimeout(function(){ a.click(); a.remove(); }, i * 250);
      });
    });

    if(delSelBtn) delSelBtn.addEventListener('click', function(){
      var ids = selectedVisible();
      if(!ids.length) return;
      var pw = window.prompt(ids.length + '개 파일을 삭제합니다.\n비밀번호를 입력하세요 (선택한 모든 파일에 동일 적용)');
      if(!pw) return;
      status.style.color = '';
      status.textContent = '삭제 중… (0/' + ids.length + ')';
      var done = 0, failed = 0, authFail = false, i = 0;
      function next(){
        if(i >= ids.length){
          status.style.color = failed ? '#c0392b' : '';
          var msg = '삭제 완료: ' + done + '개' + (failed ? (' · 실패 ' + failed + '개' + (authFail ? ' (비밀번호 불일치 포함)' : '')) : '');
          status.textContent = msg;
          load();
          return;
        }
        deleteOne(ids[i], pw).then(function(res){
          if(res.ok){ done++; delete selected[ids[i]]; } else { failed++; if(res.auth) authFail = true; }
          i++;
          status.textContent = '삭제 중… (' + (done + failed) + '/' + ids.length + ')';
          next();
        });
      }
      next();
    });

    tbody.addEventListener('click', function(e){
      var btn = e.target.closest && e.target.closest('.fdel');
      if(!btn) return;
      e.preventDefault();
      var id = btn.getAttribute('data-id');
      var pw = window.prompt('이 파일의 비밀번호를 입력하세요\n(올린 사람이 업로드 시 설정한 비밀번호)');
      if(!pw) return;
      status.style.color = '';
      deleteOne(id, pw).then(function(res){
        if(res.ok){ status.textContent = '삭제되었습니다.'; load(); return; }
        status.style.color = '#c0392b';
        if(res.auth) status.textContent = '삭제 실패: 비밀번호가 올바르지 않습니다.';
        else if(res.status) status.textContent = '삭제 오류: HTTP ' + res.status;
        else status.textContent = '삭제 오류: ' + (res.err || '');
      });
    });

    load();
  }
  // 워드보고서 작성 예시(공유 R2: samsungda-research)
  initFileList({ section:'research-section', prefix:'research', apiBase:'/api/research', fileBase:'/research/', emptyText:'아직 업로드된 결과물이 없습니다.' });

  /* 페이지 밖 드롭 시 브라우저 기본 동작 차단 */
  window.addEventListener('dragover', function(e){ if(e.dataTransfer && Array.prototype.indexOf.call(e.dataTransfer.types || [], 'Files') > -1) e.preventDefault(); });
  window.addEventListener('drop', function(e){ if(e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) e.preventDefault(); });
})();
</script>
